# skyshell baseline .tmux.conf

# ---- Core ----
set -g mouse on
set -g history-limit 999999

# Use tmux-256color when available (better italic/undercurl), fall back otherwise
if-shell 'infocmp tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "screen-256color"'
set -ag terminal-overrides ",*256col*:Tc"

# ---- Catppuccin ----
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# ---- Status line ----
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag  status-right "#{E:@catppuccin_status_session}"
set -ag  status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# ---- Prefix ----
set -g prefix C-space
unbind C-b
bind C-space send-prefix

# ---- Reload ----
unbind r
bind r source-file "$HOME/.tmux.conf" \; display-message "tmux.conf reloaded"

# ---- Pane nav ----
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind-key '%' split-window -h
bind-key '"' split-window -v
bind-key -N "Open Navi (cheat sheets)" -T prefix C-g split-window \
  "$SHELL --login -i -c 'navi --print | tmux load-buffer -b tmp - ; tmux paste-buffer -p -t {last} -b tmp -d'"

bind -n S-Left  previous-window
bind -n S-Right next-window

run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-battery/battery.tmux
